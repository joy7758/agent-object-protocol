name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  v1-freeze-check:
    name: v1 freeze check (public API changes require AEP)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Detect public-API surface changes
        id: public_api_changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            public_api:
              - "schemas/**"
              - "schemas/profiles/**"
              - "CONFORMANCE.md"
              - "V1_PUBLIC_API_CANDIDATE.md"

      - name: Require AEP reference for public-API changes
        if: steps.public_api_changes.outputs.public_api == 'true'
        shell: bash
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          if [[ "${PR_BODY:-}" == "null" ]]; then
            PR_BODY=""
          fi

          if printf '%s\n%s\n' "${PR_TITLE}" "${PR_BODY}" | grep -Eiq 'AEP-[0-9]{4}'; then
            echo "OK: AEP reference found in PR title/body."
          else
            echo "ERROR: Public API surface changed but no AEP-#### reference found."
            echo "Please add an AEP reference (for example: AEP-0009) to the PR title or description."
            exit 1
          fi

      - name: Skip note
        if: steps.public_api_changes.outputs.public_api != 'true'
        run: echo "No v1 public-API surface changes detected; skipping AEP check."

  markdown-lint:
    name: Markdown lint (spec surface only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run markdownlint-cli2 (spec surface only)
        uses: DavidAnson/markdownlint-cli2-action@v22
        with:
          globs: |
            README.md
            SPEC.md
            CONTRIBUTING.md
            SECURITY.md
            aep/**/*.md

  link-check:
    name: Link check (lychee)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --verbose
            --no-progress
            --timeout 20
            --max-retries 2
            .

  schema-validate:
    name: JSON Schema validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install ajv-cli
        run: npm i -g ajv-cli

      - name: Compile all schemas (draft2020)
        run: |
          shopt -s nullglob
          schema_files=(schemas/*.schema.json)
          if [ "${#schema_files[@]}" -eq 0 ]; then
            echo "No schema files found under schemas/"
            exit 1
          fi
          for schema in "${schema_files[@]}"; do
            echo "Compiling schema: ${schema}"
            ajv compile --spec=draft2020 -s "${schema}"
          done

      - name: Validate object examples against aop-object schema (draft2020)
        run: |
          shopt -s nullglob
          object_files=()
          for file in examples/*.json; do
            if [[ "${file}" == examples/aop-policy.*.json ]] || \
               [[ "${file}" == examples/aop-policy-decision.*.json ]]; then
              continue
            fi
            object_files+=("${file}")
          done
          if [ "${#object_files[@]}" -eq 0 ]; then
            echo "No object examples found under examples/"
            exit 1
          fi
          for file in "${object_files[@]}"; do
            echo "Validating object example: ${file}"
            ajv validate --spec=draft2020 -s schemas/aop-object.schema.json -d "${file}" --all-errors
          done

      - name: Validate policy examples against aop-policy schema (draft2020)
        run: |
          shopt -s nullglob
          policy_files=(examples/aop-policy.*.json)
          if [ "${#policy_files[@]}" -eq 0 ]; then
            echo "No policy examples found under examples/"
            exit 1
          fi
          for file in "${policy_files[@]}"; do
            echo "Validating policy example: ${file}"
            ajv validate --spec=draft2020 -s schemas/aop-policy.schema.json -d "${file}" --all-errors
          done

      - name: Validate policy decision examples (draft2020)
        run: |
          shopt -s nullglob
          decision_files=(examples/aop-policy-decision.*.json)
          if [ "${#decision_files[@]}" -eq 0 ]; then
            echo "No policy decision examples found under examples/"
            exit 1
          fi
          for file in "${decision_files[@]}"; do
            echo "Validating policy decision example: ${file}"
            ajv validate --spec=draft2020 -s schemas/aop-policy-decision.schema.json -d "${file}" --all-errors
          done

      - name: Validate v0.8 evidence examples (draft2020)
        run: |
          shopt -s nullglob
          evidence_files=(examples/v0.8/e2e/positive/*/evidence*.json)
          if [ "${#evidence_files[@]}" -eq 0 ]; then
            echo "No v0.8 evidence examples found under examples/v0.8/e2e/positive"
            exit 1
          fi
          for file in "${evidence_files[@]}"; do
            echo "Validating v0.8 evidence example: ${file}"
            ajv validate --spec=draft2020 -s schemas/aop-evidence.schema.json -d "${file}" --all-errors
          done

      - name: Compile evidence profile schemas (draft2020)
        run: |
          ajv compile --spec=draft2020 -r schemas/aop-evidence.schema.json -s schemas/profiles/aop-provenance.profile.schema.json
          ajv compile --spec=draft2020 -r schemas/aop-evidence.schema.json -s schemas/profiles/slsa-provenance-min.profile.schema.json

      - name: Compile DSSE envelope profile schema (draft2020)
        run: |
          ajv compile --spec=draft2020 -s schemas/profiles/dsse-envelope.profile.schema.json

      - name: Validate v1.1 DSSE positive fixtures (draft2020)
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          dsse_files=(examples/v1.1/dsse/positive/*.json)
          if [ "${#dsse_files[@]}" -eq 0 ]; then
            echo "No v1.1 DSSE positive fixtures found; skipping."
            exit 0
          fi

          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "${tmp_dir}"' EXIT

          for file in "${dsse_files[@]}"; do
            echo "Validating DSSE envelope schema: ${file}"
            ajv validate --spec=draft2020 -s schemas/profiles/dsse-envelope.profile.schema.json -d "${file}" --all-errors

            out_json="${tmp_dir}/$(basename "${file}" .json).payload.json"
            node -e '
              const fs = require("fs");
              const inputPath = process.argv[1];
              const outputPath = process.argv[2];
              const doc = JSON.parse(fs.readFileSync(inputPath, "utf8"));

              if (!doc.payloadType || typeof doc.payloadType !== "string") {
                throw new Error("payloadType missing");
              }
              if (!doc.payloadType.endsWith("+json")) {
                throw new Error("unsupported payloadType for JSON parse: " + doc.payloadType);
              }

              const payload = doc.payload || "";
              const normalized = payload.replace(/\s+/g, "");
              const decoded = Buffer.from(normalized, "base64");
              const reencoded = decoded.toString("base64").replace(/=+$/, "");
              const original = normalized.replace(/=+$/, "");
              if (original.length === 0 || reencoded !== original) {
                throw new Error("payload is not valid canonical base64");
              }

              let parsed;
              try {
                parsed = JSON.parse(decoded.toString("utf8"));
              } catch (err) {
                throw new Error("decoded payload is not valid JSON: " + err.message);
              }

              fs.writeFileSync(outputPath, JSON.stringify(parsed, null, 2));
            ' "${file}" "${out_json}"

            echo "Validating decoded DSSE payload as AOP evidence: ${file}"
            ajv validate --spec=draft2020 -s schemas/aop-evidence.schema.json -d "${out_json}" --all-errors
          done

      - name: Validate v0.9 profile evidence fixtures (draft2020)
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          aop_profile_files=(examples/v0.9/e2e/positive/*/evidence.*.aop-provenance.json)
          slsa_profile_files=(examples/v0.9/e2e/positive/*/evidence.*.slsa-provenance.json)

          if [ "${#aop_profile_files[@]}" -eq 0 ] && [ "${#slsa_profile_files[@]}" -eq 0 ]; then
            echo "No v0.9 profile evidence fixtures found; skipping."
            exit 0
          fi

          for file in "${aop_profile_files[@]}"; do
            echo "Validating v0.9 AOP provenance profile fixture: ${file}"
            ajv validate --spec=draft2020 -r schemas/aop-evidence.schema.json -s schemas/profiles/aop-provenance.profile.schema.json -d "${file}" --all-errors
          done

          for file in "${slsa_profile_files[@]}"; do
            echo "Validating v0.9 SLSA-min provenance profile fixture: ${file}"
            ajv validate --spec=draft2020 -r schemas/aop-evidence.schema.json -s schemas/profiles/slsa-provenance-min.profile.schema.json -d "${file}" --all-errors
          done

      - name: Validate registry examples (draft2020)
        run: |
          shopt -s nullglob
          registry_record_files=(examples/registry/aop-registry-record*.json)
          if [ "${#registry_record_files[@]}" -eq 0 ]; then
            echo "No registry record examples found under examples/registry"
            exit 1
          fi
          for file in "${registry_record_files[@]}"; do
            echo "Validating registry record example: ${file}"
            ajv validate --spec=draft2020 -s schemas/aop-registry-record.schema.json -d "${file}" --all-errors
          done

          registry_response_files=(examples/registry/aop-resolve-response*.json)
          if [ "${#registry_response_files[@]}" -eq 0 ]; then
            echo "No resolve response examples found under examples/registry"
            exit 1
          fi
          for file in "${registry_response_files[@]}"; do
            echo "Validating resolve response example: ${file}"
            ajv validate --spec=draft2020 -s schemas/aop-resolve-response.schema.json -d "${file}" --all-errors
          done

      - name: Validate object invalid fixtures are rejected (draft2020)
        run: |
          shopt -s nullglob
          object_invalid=()
          for file in examples/invalid/*.json; do
            if [[ "${file}" == examples/invalid/aop-policy-* ]] || \
               [[ "${file}" == examples/invalid/aop-policy-decision-* ]] || \
               [[ "${file}" == examples/invalid/aop-registry-record-* ]] || \
               [[ "${file}" == examples/invalid/aop-resolve-response-* ]]; then
              continue
            fi
            object_invalid+=("${file}")
          done
          if [ "${#object_invalid[@]}" -eq 0 ]; then
            echo "No object invalid fixtures found under examples/invalid"
            exit 1
          fi
          for file in "${object_invalid[@]}"; do
            echo "Expecting object schema validation failure: ${file}"
            if ajv validate --spec=draft2020 -s schemas/aop-object.schema.json -d "${file}" --all-errors; then
              echo "Unexpectedly valid object invalid fixture: ${file}"
              exit 1
            fi
          done
          echo "All object invalid fixtures were correctly rejected."

      - name: Validate policy invalid fixtures are rejected (draft2020)
        run: |
          shopt -s nullglob
          policy_invalid=()
          for file in examples/invalid/aop-policy-*.json; do
            if [[ "${file}" == examples/invalid/aop-policy-decision-* ]]; then
              continue
            fi
            policy_invalid+=("${file}")
          done
          if [ "${#policy_invalid[@]}" -eq 0 ]; then
            echo "No policy invalid fixtures found under examples/invalid"
            exit 1
          fi
          for file in "${policy_invalid[@]}"; do
            echo "Expecting policy schema validation failure: ${file}"
            if ajv validate --spec=draft2020 -s schemas/aop-policy.schema.json -d "${file}" --all-errors; then
              echo "Unexpectedly valid policy invalid fixture: ${file}"
              exit 1
            fi
          done
          echo "All policy invalid fixtures were correctly rejected."

      - name: Validate policy decision invalid fixtures are rejected (draft2020)
        run: |
          shopt -s nullglob
          decision_invalid=(examples/invalid/aop-policy-decision-*.json)
          if [ "${#decision_invalid[@]}" -eq 0 ]; then
            echo "No policy decision invalid fixtures found under examples/invalid"
            exit 1
          fi
          for file in "${decision_invalid[@]}"; do
            echo "Expecting policy decision schema validation failure: ${file}"
            if ajv validate --spec=draft2020 -s schemas/aop-policy-decision.schema.json -d "${file}" --all-errors; then
              echo "Unexpectedly valid policy decision invalid fixture: ${file}"
              exit 1
            fi
          done
          echo "All policy decision invalid fixtures were correctly rejected."

      - name: Validate registry invalid fixtures are rejected (draft2020)
        run: |
          shopt -s nullglob
          registry_record_invalid=(examples/invalid/aop-registry-record-*.json)
          if [ "${#registry_record_invalid[@]}" -eq 0 ]; then
            echo "No registry record invalid fixtures found under examples/invalid"
            exit 1
          fi
          for file in "${registry_record_invalid[@]}"; do
            echo "Expecting registry-record schema validation failure: ${file}"
            if ajv validate --spec=draft2020 -s schemas/aop-registry-record.schema.json -d "${file}" --all-errors; then
              echo "Unexpectedly valid registry-record invalid fixture: ${file}"
              exit 1
            fi
          done

          registry_response_invalid=(examples/invalid/aop-resolve-response-*.json)
          if [ "${#registry_response_invalid[@]}" -eq 0 ]; then
            echo "No resolve-response invalid fixtures found under examples/invalid"
            exit 1
          fi
          for file in "${registry_response_invalid[@]}"; do
            echo "Expecting resolve-response schema validation failure: ${file}"
            if ajv validate --spec=draft2020 -s schemas/aop-resolve-response.schema.json -d "${file}" --all-errors; then
              echo "Unexpectedly valid resolve-response invalid fixture: ${file}"
              exit 1
            fi
          done
          echo "All registry invalid fixtures were correctly rejected."

      - name: v0.5 combo fixtures gate (skip if none)
        shell: bash
        run: |
          set -euo pipefail
          if ! find examples/v0.5/combo -type f -name "*.json" -print -quit | grep -q .; then
            echo "No v0.5 combo JSON fixtures present; skipping v0.5 combo gate."
            exit 0
          fi

          shopt -s nullglob
          object_files=(examples/v0.5/combo/object/*.json)
          policy_files=(examples/v0.5/combo/policy/*.json)
          expected_files=(examples/v0.5/combo/expected/*.expected.json)
          semantic_invalid_files=(examples/v0.5/combo/expected/*.expected.invalid.json)

          if [ "${#object_files[@]}" -eq 0 ] || \
             [ "${#policy_files[@]}" -eq 0 ] || \
             [ "${#expected_files[@]}" -eq 0 ]; then
            echo "v0.5 combo gate requires object, policy, and expected fixtures."
            exit 1
          fi

          echo "Compiling combo schemas..."
          ajv compile --spec=draft2020 -s schemas/aop-object.schema.json
          ajv compile --spec=draft2020 -s schemas/aop-policy.schema.json
          ajv compile --spec=draft2020 -s schemas/aop-policy-decision.schema.json

          echo "Validating v0.5 combo object fixtures..."
          for file in "${object_files[@]}"; do
            ajv validate --spec=draft2020 -s schemas/aop-object.schema.json -d "${file}" --all-errors
          done

          echo "Validating v0.5 combo policy fixtures..."
          for file in "${policy_files[@]}"; do
            ajv validate --spec=draft2020 -s schemas/aop-policy.schema.json -d "${file}" --all-errors
          done

          echo "Validating v0.5 combo expected decisions..."
          for file in "${expected_files[@]}"; do
            ajv validate --spec=draft2020 -s schemas/aop-policy-decision.schema.json -d "${file}" --all-errors
          done

          if [ "${#semantic_invalid_files[@]}" -gt 0 ]; then
            echo "Validating schema shape for semantic-invalid combo fixtures..."
            for file in "${semantic_invalid_files[@]}"; do
              ajv validate --spec=draft2020 -s schemas/aop-policy-decision.schema.json -d "${file}" --all-errors
            done
          fi

          validate_combo_semantics() {
            local mode="$1"
            local file="$2"
            MODE="${mode}" FILE="${file}" node -e '
              const fs = require("fs");
              const file = process.env.FILE;
              const mode = process.env.MODE;
              const data = JSON.parse(fs.readFileSync(file, "utf8"));
              const basename = file.split("/").pop();
              const strategy = data?.decision?.strategy;
              const effect = data?.decision?.effect;
              const reasonCodes = Array.isArray(data?.reasons) ? data.reasons.map((r) => r.code) : [];
              const hasPatches = Array.isArray(data?.patches) && data.patches.length > 0;

              let semanticOk = true;
              if (basename.includes("strategy-demo.first_match")) {
                semanticOk =
                  strategy === "first_match" &&
                  effect === "allow" &&
                  reasonCodes.includes("ALLOW_BASELINE") &&
                  !hasPatches;
              } else if (basename.includes("strategy-demo.deny_overrides")) {
                semanticOk =
                  strategy === "deny_overrides" &&
                  effect === "deny" &&
                  reasonCodes.includes("DENY_HIGH_SIDE_EFFECTS") &&
                  hasPatches;
              }

              if (mode === "valid" && !semanticOk) {
                console.error(`Semantic validation failed (expected valid): ${file}`);
                process.exit(1);
              }

              if (mode === "invalid" && semanticOk) {
                console.error(`Semantic validation unexpectedly passed (expected invalid): ${file}`);
                process.exit(1);
              }
            '
          }

          echo "Validating semantic consistency for combo expected fixtures..."
          for file in "${expected_files[@]}"; do
            validate_combo_semantics "valid" "${file}"
          done

          if [ "${#semantic_invalid_files[@]}" -gt 0 ]; then
            echo "Validating semantic-invalid combo fixtures are rejected..."
            for file in "${semantic_invalid_files[@]}"; do
              validate_combo_semantics "invalid" "${file}"
            done
          else
            echo "No semantic-invalid combo fixtures found; skipping semantic invalid gate."
          fi

          echo "OK: v0.5 combo fixtures validated."

      - name: v0.5 MCP interop fixtures gate (skip if none)
        shell: bash
        run: |
          set -euo pipefail
          if ! compgen -G "examples/v0.5/mcp/tool/*.json" > /dev/null; then
            echo "No v0.5 MCP tool fixtures present; skipping v0.5 MCP gate."
            exit 0
          fi

          shopt -s nullglob
          tool_files=(examples/v0.5/mcp/tool/*.json)
          if [ "${#tool_files[@]}" -eq 0 ]; then
            echo "No v0.5 MCP tool fixtures present; skipping v0.5 MCP gate."
            exit 0
          fi

          echo "Validate MCP tool fixtures as AOP objects..."
          for file in "${tool_files[@]}"; do
            ajv validate --spec=draft2020 -s schemas/aop-object.schema.json -d "${file}" --all-errors
          done

          for tool_file in "${tool_files[@]}"; do
            tool_basename="$(basename "${tool_file}")"
            tool_prefix="${tool_basename%%.*}"
            tmp_schema="${RUNNER_TEMP:-/tmp}/aop_v05_mcp_output_${tool_prefix}.schema.json"

            echo "Derive output schema from MCP tool fixture: ${tool_basename}"
            TOOL_FILE="${tool_file}" TMP_SCHEMA="${tmp_schema}" node -e '
              const fs = require("fs");
              const tool = JSON.parse(fs.readFileSync(process.env.TOOL_FILE, "utf8"));
              if (!tool.schema || !tool.schema.outputs) {
                throw new Error("tool.schema.outputs missing: " + process.env.TOOL_FILE);
              }
              fs.writeFileSync(process.env.TMP_SCHEMA, JSON.stringify(tool.schema.outputs, null, 2));
            '

            ajv compile --spec=draft2020 -s "${tmp_schema}"

            expected_pattern="examples/v0.5/mcp/expected/${tool_prefix}.output*.json"
            invalid_pattern="examples/invalid/v0.5/mcp/${tool_prefix}.output*.invalid.json"
            expected_files=(${expected_pattern})
            invalid_files=(${invalid_pattern})

            if [ "${#expected_files[@]}" -gt 0 ]; then
              for file in "${expected_files[@]}"; do
                ajv validate --spec=draft2020 -s "${tmp_schema}" -d "${file}" --all-errors
              done
            else
              echo "No expected MCP outputs found for prefix ${tool_prefix}; skipping expected validation."
            fi

            if [ "${#invalid_files[@]}" -gt 0 ]; then
              for file in "${invalid_files[@]}"; do
                if ajv validate --spec=draft2020 -s "${tmp_schema}" -d "${file}" --all-errors; then
                  echo "ERROR: expected invalid MCP output to be rejected: ${file}"
                  exit 1
                fi
              done
              echo "OK: all invalid MCP outputs rejected for prefix ${tool_prefix}."
            else
              echo "No invalid MCP outputs found for prefix ${tool_prefix}; skipping invalid gate."
            fi
          done

          echo "OK: v0.5 MCP interop fixtures validated."

      - name: v0.6 combo fixtures gate (skip if none)
        shell: bash
        run: |
          set -euo pipefail
          if ! find examples/v0.6/combo -type f -name "*.json" -print -quit | grep -q .; then
            echo "No v0.6 combo JSON fixtures present; skipping v0.6 combo gate."
            exit 0
          fi

          shopt -s nullglob
          object_files=(examples/v0.6/combo/object/*.json)
          policy_files=(examples/v0.6/combo/policy/*.json)
          expected_files=(examples/v0.6/combo/expected/*.expected.json)
          semantic_invalid_files=(
            examples/v0.6/combo/expected/*.expected.invalid.json
            examples/v0.6/combo/expected/*.semantic.invalid.json
          )

          if [ "${#object_files[@]}" -eq 0 ] || \
             [ "${#policy_files[@]}" -eq 0 ] || \
             [ "${#expected_files[@]}" -eq 0 ]; then
            echo "v0.6 combo gate requires object, policy, and expected fixtures."
            exit 1
          fi

          echo "Compiling v0.6 combo schemas..."
          ajv compile --spec=draft2020 -s schemas/aop-object.schema.json
          ajv compile --spec=draft2020 -s schemas/aop-policy.schema.json
          ajv compile --spec=draft2020 -s schemas/aop-policy-decision.schema.json

          echo "Validating v0.6 combo object fixtures..."
          for file in "${object_files[@]}"; do
            ajv validate --spec=draft2020 -s schemas/aop-object.schema.json -d "${file}" --all-errors
          done

          echo "Validating v0.6 combo policy fixtures..."
          for file in "${policy_files[@]}"; do
            ajv validate --spec=draft2020 -s schemas/aop-policy.schema.json -d "${file}" --all-errors
          done

          echo "Validating v0.6 combo expected decisions..."
          for file in "${expected_files[@]}"; do
            ajv validate --spec=draft2020 -s schemas/aop-policy-decision.schema.json -d "${file}" --all-errors
          done

          if [ "${#semantic_invalid_files[@]}" -gt 0 ]; then
            echo "Validating schema shape for v0.6 semantic-invalid fixtures..."
            for file in "${semantic_invalid_files[@]}"; do
              ajv validate --spec=draft2020 -s schemas/aop-policy-decision.schema.json -d "${file}" --all-errors
            done
          fi

          validate_v06_combo_semantics() {
            local mode="$1"
            local file="$2"
            MODE="${mode}" FILE="${file}" node -e '
              const fs = require("fs");
              const file = process.env.FILE;
              const mode = process.env.MODE;
              const data = JSON.parse(fs.readFileSync(file, "utf8"));
              const basename = file.split("/").pop();
              const strategy = data?.decision?.strategy;
              const effect = data?.decision?.effect;
              const reasonCodes = Array.isArray(data?.reasons) ? data.reasons.map((r) => r.code) : [];
              const hasPatches = Array.isArray(data?.patches) && data.patches.length > 0;

              let caseHandled = false;
              let semanticOk = true;

              if (basename.includes("c1-permit-vs-deny.first_match")) {
                caseHandled = true;
                semanticOk =
                  strategy === "first_match" &&
                  effect === "allow" &&
                  reasonCodes.includes("ALLOW_TOOL_BASELINE") &&
                  !hasPatches;
              } else if (basename.includes("c1-permit-vs-deny.deny_overrides")) {
                caseHandled = true;
                semanticOk =
                  strategy === "deny_overrides" &&
                  effect === "deny" &&
                  reasonCodes.includes("DENY_SENSITIVE_WRITE") &&
                  hasPatches;
              } else if (basename.includes("c2-permit-vs-deny.permit_overrides")) {
                caseHandled = true;
                semanticOk =
                  strategy === "permit_overrides" &&
                  effect === "allow" &&
                  reasonCodes.includes("ALLOW_LOW_SIDE_EFFECTS") &&
                  !hasPatches;
              } else if (basename.includes("c2-permit-vs-deny.deny_unless_permit")) {
                caseHandled = true;
                semanticOk =
                  strategy === "deny_unless_permit" &&
                  effect === "deny" &&
                  reasonCodes.includes("DENY_UNRESTRICTED_NETWORK") &&
                  hasPatches;
              }

              if (mode === "valid") {
                if (!caseHandled || !semanticOk) {
                  console.error(`v0.6 semantic validation failed (expected valid): ${file}`);
                  process.exit(1);
                }
              }

              if (mode === "invalid") {
                if (!caseHandled) {
                  console.error(`v0.6 semantic validation could not map invalid case: ${file}`);
                  process.exit(1);
                }
                if (semanticOk) {
                  console.error(`v0.6 semantic validation unexpectedly passed invalid fixture: ${file}`);
                  process.exit(1);
                }
              }
            '
          }

          echo "Validating semantic consistency for v0.6 combo expected fixtures..."
          for file in "${expected_files[@]}"; do
            validate_v06_combo_semantics "valid" "${file}"
          done

          if [ "${#semantic_invalid_files[@]}" -gt 0 ]; then
