name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  markdown-lint:
    name: Markdown lint (spec surface only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run markdownlint-cli2 (spec surface only)
        uses: DavidAnson/markdownlint-cli2-action@v22
        with:
          globs: |
            README.md
            SPEC.md
            CONTRIBUTING.md
            SECURITY.md
            aep/**/*.md

  link-check:
    name: Link check (lychee)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --verbose
            --no-progress
            --exclude-mail
            --timeout 20
            --max-retries 2
            .

  schema-validate:
    name: JSON Schema validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install ajv-cli
        run: npm i -g ajv-cli

      - name: Validate examples against AOP schema
        run: |
          ajv validate \
            --spec=draft2020 \
            -s schemas/aop-object.schema.json \
            -d "examples/*.json" \
            --all-errors
