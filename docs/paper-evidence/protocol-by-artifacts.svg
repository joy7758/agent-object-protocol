<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Protocol-by-Artifacts</title>
  <desc id="desc">AOP protocol claims are adjudicated by schemas, fixtures, CI gates, and evidence assets.</desc>

  <defs>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #334155; }
      .label { font: 700 20px Arial, sans-serif; fill: #0f172a; }
      .body { font: 400 15px Arial, sans-serif; fill: #334155; }
      .card { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 14; }
      .head { fill: #e2e8f0; }
      .arrow { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .frame { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb" />
    </marker>
  </defs>

  <rect x="20" y="20" width="1160" height="380" class="frame" />

  <text x="48" y="70" class="title">Protocol-by-Artifacts</text>
  <text x="48" y="100" class="subtitle">AOP claims are validated by executable artifacts and CI adjudication.</text>

  <rect x="48" y="140" width="250" height="180" class="card" />
  <rect x="48" y="140" width="250" height="44" class="card head" />
  <text x="68" y="168" class="label">Schemas</text>
  <text x="68" y="205" class="body">JSON Schema contracts</text>
  <text x="68" y="230" class="body">for object/policy/evidence</text>
  <text x="68" y="255" class="body">and profile surfaces.</text>

  <rect x="332" y="140" width="250" height="180" class="card" />
  <rect x="332" y="140" width="250" height="44" class="card head" />
  <text x="352" y="168" class="label">Fixtures</text>
  <text x="352" y="205" class="body">Positive + invalid suites</text>
  <text x="352" y="230" class="body">including adversarial</text>
  <text x="352" y="255" class="body">negative fixtures.</text>

  <rect x="616" y="140" width="250" height="180" class="card" />
  <rect x="616" y="140" width="250" height="44" class="card head" />
  <text x="636" y="168" class="label">CI Gates</text>
  <text x="636" y="205" class="body">Parse-aware + semantic</text>
  <text x="636" y="230" class="body">reject checks with</text>
  <text x="636" y="255" class="body">deterministic pass/fail.</text>

  <rect x="900" y="140" width="250" height="180" class="card" />
  <rect x="900" y="140" width="250" height="44" class="card head" />
  <text x="920" y="168" class="label">Evidence</text>
  <text x="920" y="205" class="body">S1-S8 screenshots,</text>
  <text x="920" y="230" class="body">clean logs, run links,</text>
  <text x="920" y="255" class="body">paper evidence assets.</text>

  <path d="M298 230 L332 230" class="arrow" />
  <path d="M582 230 L616 230" class="arrow" />
  <path d="M866 230 L900 230" class="arrow" />

  <text x="48" y="360" class="subtitle">Result: protocol conformance becomes adjudicable, reproducible, and citation-ready.</text>
</svg>
